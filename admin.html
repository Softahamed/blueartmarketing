<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlueArt Admin — Upload Works</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080c14;--bg2:#0d1422;--card:#0f1a2e;--border:rgba(59,130,246,0.15);--text:#f0f4ff;--muted:#8899bb;--accent:#3b82f6;--accent2:#06b6d4;--glow:rgba(59,130,246,0.3);--danger:#ef4444}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  /* LOGIN */
  .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
  .login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3rem;width:100%;max-width:400px;text-align:center}
  .login-logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.5rem}
  .login-sub{color:var(--muted);font-size:0.9rem;margin-bottom:2rem}
  .login-input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:0.85rem 1rem;border-radius:10px;font-family:'Inter',sans-serif;font-size:1rem;outline:none;text-align:center;letter-spacing:0.2em;margin-bottom:1rem;transition:border-color 0.2s}
  .login-input:focus{border-color:var(--accent)}
  .login-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:0.85rem;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity 0.2s}
  .login-btn:hover{opacity:0.9}
  .login-error{color:var(--danger);font-size:0.85rem;margin-top:0.75rem;display:none}
  .lock-icon{font-size:3rem;margin-bottom:1.5rem}

  /* ADMIN */
  .admin-screen{display:none;min-height:100vh}
  .admin-nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
  .admin-nav .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:0.4rem 1rem;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.85rem;transition:all 0.2s}
  .logout-btn:hover{border-color:var(--danger);color:var(--danger)}

  .admin-content{max-width:1000px;margin:0 auto;padding:2rem}
  .admin-title{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:0.5rem}
  .admin-sub{color:var(--muted);margin-bottom:2rem;font-size:0.9rem}

  .upload-box{border:2px dashed var(--border);border-radius:16px;padding:2.5rem;text-align:center;cursor:pointer;transition:all 0.3s;margin-bottom:2rem}
  .upload-box:hover{border-color:var(--accent);background:rgba(59,130,246,0.05)}
  .upload-box .icon{font-size:2.5rem;margin-bottom:0.75rem}
  .upload-box h3{font-family:'Syne',sans-serif;font-size:1.1rem;margin-bottom:0.4rem}
  .upload-box p{color:var(--muted);font-size:0.85rem}
  #fileInput{display:none}

  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
  .form-group{display:flex;flex-direction:column;gap:0.4rem}
  .form-group label{font-size:0.8rem;color:var(--muted);font-weight:500}
  .form-group input,.form-group select,.form-group textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:0.7rem 1rem;border-radius:8px;font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s}
  .form-group input:focus,.form-group select:focus{border-color:var(--accent)}
  .form-group select option{background:var(--bg2)}

  .preview-area{margin-bottom:1.5rem;display:none}
  .preview-area img{width:100%;max-height:300px;object-fit:cover;border-radius:12px;border:1px solid var(--border)}

  .add-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:0.85rem 2rem;border-radius:8px;font-size:0.95rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;width:100%;margin-bottom:2rem;transition:opacity 0.2s}
  .add-btn:hover{opacity:0.9}
  .add-btn:disabled{opacity:0.5;cursor:not-allowed}

  .divider{border:none;border-top:1px solid var(--border);margin:2rem 0}

  .works-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
  .works-header h2{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700}
  .works-count{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:var(--accent2);padding:0.2rem 0.8rem;border-radius:20px;font-size:0.8rem}

  .works-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
  .work-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:relative}
  .work-card img{width:100%;height:160px;object-fit:cover;display:block}
  .work-card .work-info{padding:0.75rem}
  .work-card .work-title{font-weight:600;font-size:0.9rem;margin-bottom:0.2rem}
  .work-card .work-cat{color:var(--accent2);font-size:0.75rem}
  .work-card .delete-btn{position:absolute;top:0.5rem;right:0.5rem;background:rgba(239,68,68,0.9);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
  .work-card .delete-btn:hover{background:var(--danger)}

  .empty-works{text-align:center;padding:3rem;color:var(--muted);grid-column:1/-1}
  .empty-works .e-icon{font-size:2.5rem;margin-bottom:0.75rem}

  .toast{position:fixed;bottom:2rem;right:2rem;background:var(--accent);color:#fff;padding:0.75rem 1.5rem;border-radius:10px;font-size:0.9rem;font-weight:500;transform:translateY(100px);opacity:0;transition:all 0.3s;z-index:999}
  .toast.show{transform:translateY(0);opacity:1}

  @media(max-width:600px){.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="lock-icon">🔐</div>
    <div class="login-logo">BlueArt Marketing</div>
    <div class="login-sub">Admin Panel — Enter password to continue</div>
    <input type="password" class="login-input" id="pwInput" placeholder="••••••" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Enter Admin</button>
    <div class="login-error" id="loginError">❌ Wrong password. Try again.</div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="adminScreen">
  <div class="admin-nav">
    <div class="logo">BlueArt Admin</div>
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>
  <div class="admin-content">
    <div class="admin-title">Upload Your Work</div>
    <div class="admin-sub">Add new designs, photos, and projects. They'll appear on your portfolio automatically.</div>

    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📁</div>
      <h3>Click to Select Image</h3>
      <p>JPG, PNG supported</p>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="previewFile(event)">

    <div class="preview-area" id="previewArea">
      <img id="previewImg" src="" alt="Preview">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Work Title</label>
        <input type="text" id="workTitle" placeholder="e.g. Wedding Album Design">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="workCat">
          <option value="design">Graphic Design</option>
          <option value="photo">Photography</option>
          <option value="web">Web Development</option>
        </select>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:1rem">
      <label>Short Description</label>
      <input type="text" id="workDesc" placeholder="e.g. Dark composite portrait for client">
    </div>

    <button class="add-btn" id="addBtn" onclick="addWork()" disabled>➕ Add to Portfolio</button>

    <hr class="divider">

    <div class="works-header">
      <h2>Your Portfolio Works</h2>
      <span class="works-count" id="worksCount">0 works</span>
    </div>
    <div class="works-grid" id="worksGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const PASSWORD = '2005';
  let currentImageData = null;
  let works = [];

  // LOGIN
  function login(){
    const pw = document.getElementById('pwInput').value;
    if(pw === PASSWORD){
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').style.display = 'block';
      loadWorks();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('pwInput').value = '';
    }
  }

  function logout(){
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminScreen').style.display = 'none';
    document.getElementById('pwInput').value = '';
    document.getElementById('loginError').style.display = 'none';
  }

  // PREVIEW
  function previewFile(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      currentImageData = ev.target.result;
      document.getElementById('previewImg').src = currentImageData;
      document.getElementById('previewArea').style.display = 'block';
      document.getElementById('addBtn').disabled = false;
    };
    reader.readAsDataURL(file);
  }

  // ADD WORK
  async function addWork(){
    const title = document.getElementById('workTitle').value.trim();
    const cat = document.getElementById('workCat').value;
    const desc = document.getElementById('workDesc').value.trim();
    const catLabels = {design:'Graphic Design', photo:'Photography', web:'Web Development'};

    if(!currentImageData){ showToast('Please select an image!'); return; }
    if(!title){ showToast('Please enter a title!'); return; }

    const work = {
      id: Date.now(),
      title: title || 'Untitled',
      desc: desc || 'BlueArt Marketing',
      cat,
      catLabel: catLabels[cat],
      img: currentImageData
    };

    works.unshift(work);
    await saveWorks();
    renderWorks();
    resetForm();
    showToast('✅ Work added to portfolio!');
  }

  async function deleteWork(id){
    if(!confirm('Remove this work from portfolio?')) return;
    works = works.filter(w => w.id !== id);
    await saveWorks();
    renderWorks();
    showToast('🗑️ Work removed');
  }

  // STORAGE
  async function saveWorks(){
    try{
      await window.storage.set('portfolio_works', JSON.stringify(works), true);
    }catch(e){ console.error('Save error',e); }
  }

  async function loadWorks(){
    try{
      const res = await window.storage.get('portfolio_works', true);
      if(res && res.value) works = JSON.parse(res.value);
    }catch(e){ works = []; }
    renderWorks();
  }

  function renderWorks(){
    const grid = document.getElementById('worksGrid');
    document.getElementById('worksCount').textContent = `${works.length} work${works.length!==1?'s':''}`;
    if(works.length === 0){
      grid.innerHTML = '<div class="empty-works"><div class="e-icon">📂</div><p>No works yet. Upload your first piece!</p></div>';
      return;
    }
    grid.innerHTML = works.map(w => `
      <div class="work-card">
        <img src="${w.img}" alt="${w.title}" onerror="this.src='data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'100\' height=\'100\'><rect fill=\'%230f1a2e\' width=\'100\' height=\'100\'/><text y=\'50\' x=\'50\' text-anchor=\'middle\' fill=\'%233b82f6\' font-size=\'30\'>🎨</text></svg>'">
        <div class="work-info">
          <div class="work-title">${w.title}</div>
          <div class="work-cat">${w.catLabel}</div>
        </div>
        <button class="delete-btn" onclick="deleteWork(${w.id})">✕</button>
      </div>`).join('');
  }

  function resetForm(){
    document.getElementById('workTitle').value = '';
    document.getElementById('workDesc').value = '';
    document.getElementById('workCat').value = 'design';
    document.getElementById('previewArea').style.display = 'none';
    document.getElementById('fileInput').value = '';
    document.getElementById('addBtn').disabled = true;
    currentImageData = null;
  }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
